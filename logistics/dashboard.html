<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics Dashboard | FarmConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/global.css">
    <style>
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border-subtle);
            height: 100vh;
            position: fixed;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            z-index: 100;
        }

        .main-content {
            margin-left: 280px;
            padding: 4rem;
            background: var(--bg-main);
            min-height: 100vh;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .nav-item.active {
            background: var(--logistics-light);
            color: var(--logistics-dark);
        }

        .nav-item:hover:not(.active) {
            background: var(--bg-main);
            color: var(--text-main);
        }

        .stat-card {
            background: var(--surface);
            padding: 2rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-sm);
            flex: 1;
        }

        .order-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 2rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-sm);
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 2rem;
            transition: transform 0.2s;
        }

        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .order-icon {
            width: 50px;
            height: 50px;
            background: var(--logistics-light);
            color: var(--logistics);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .status-pill {
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-pending { background: #fef3c7; color: #92400e; }
        .status-transit { background: #dbeafe; color: #1e40af; }
        .status-delivered { background: #d1fae5; color: #065f46; }

        .btn-action {
            background: var(--logistics);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-action:hover { background: var(--logistics-dark); }
        .btn-delivered { background: #10b981; }
        .btn-delivered:hover { background: #059669; }
    </style>
</head>
<body style="background: var(--bg-main);">

    <aside class="sidebar">
        <a href="../index.html" class="logo" style="text-decoration: none; color: inherit;">
            🌾 <span style="font-weight: 850; font-size: 1.25rem; letter-spacing: -0.5px;">FarmConnect</span>
        </a>

        <nav style="display: flex; flex-direction: column; gap: 0.5rem;">
            <a href="#" class="nav-item active">
                <i class="fa-solid fa-truck-fast"></i> Active Shipments
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-clipboard-check"></i> History
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-map-location-dot"></i> Network Map
            </a>
        </nav>

        <div style="margin-top: auto;">
            <a href="../index.html" class="nav-item">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3.5rem;">
            <div>
                <h1 style="font-size: 2.25rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 0.5rem; color: var(--text-main);">Logistics Hub</h1>
                <p style="color: var(--text-muted); font-weight: 500;">Real-time management for "Home Delivery" orders.</p>
            </div>
            
            <div style="display: flex; gap: 1.5rem; min-width: 400px;">
                <div class="stat-card">
                    <span style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 800;">Pending Pickup</span>
                    <h2 id="stat-pending" style="font-size: 1.75rem; font-weight: 900; margin-top: 0.25rem;">0</h2>
                </div>
                <div class="stat-card">
                    <span style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 800;">In Transit</span>
                    <h2 id="stat-transit" style="font-size: 1.75rem; font-weight: 900; margin-top: 0.25rem;">0</h2>
                </div>
            </div>
        </header>

        <section id="shipment-list">
            <!-- Dynamic Shipment Injection -->
            <div style="text-align: center; padding: 5rem 2rem; background: var(--surface); border-radius: var(--radius-xl); border: 2px dashed var(--border-strong);">
                <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--logistics); margin-bottom: 1rem;"></i>
                <p style="color: var(--text-muted); font-weight: 600;">Syncing with Marketplace...</p>
            </div>
        </section>
    </main>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
