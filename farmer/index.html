<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Farmer Portal</title>
    <link rel="stylesheet" href="../assets/global.css">
    <link rel="stylesheet" href="farmer.css">
</head>
<body>
    <a href="../index.html" style="position:absolute; top:20px; left:20px; text-decoration:none; color:var(--dark-green); font-weight:bold;">← Back to Role Select</a>
    
    <div class="auth-container">
        <div class="auth-card card-premium animate-fade">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🧑‍🌾</div>
            <h1 style="margin-bottom: 0.5rem;">Farmer Portal</h1>
            <p style="color: var(--text-muted); margin-bottom: 2.5rem;">Manage your harvest, connect with buyers, and grow your business.</p>
            
            <form id="farmer-login-form">
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="login-mobile" placeholder="+91 98765 43210" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login to Dashboard</button>
            </form>
            
            <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-subtle);">
                <p style="font-size: 0.95rem;">New to FarmConnect? <a href="register.html" style="color: var(--primary); font-weight: 700; text-decoration: none;">Register Your Farm</a></p>
            </div>
            <a href="../index.html" style="display: block; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); text-decoration: none; font-weight: 600;">← Back to Role Select</a>
        </div>
    </div>
    <!-- Firebase Logic -->
    <script type="module">
        import { db, collection, query, where, getDocs } from "../assets/firebase-config.js";

        const loginForm = document.querySelector('form');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const mobile = document.querySelectorAll('input')[0].value;
            const password = document.querySelectorAll('input')[1].value;
            const submitBtn = document.querySelector('button');

            submitBtn.textContent = "Logging in...";
            submitBtn.disabled = true;

            try {
                // Query Firestore for user
                const q = query(collection(db, "users"), where("mobile", "==", mobile), where("password", "==", password), where("role", "==", "farmer"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    alert("Invalid mobile number or password for Farmer account.");
                    submitBtn.textContent = "Log in to Marketplace 🔍";
                    submitBtn.disabled = false;
                    return;
                }

                // Get user data
                const userDoc = querySnapshot.docs[0];
                const userData = userDoc.data();

                // Store user session info
                localStorage.setItem('farmerId', userDoc.id);
                localStorage.setItem('farmName', userData.farmName);
                localStorage.setItem('farmerLocation', userData.location);

                window.location.href = "dashboard.html";
            } catch (err) {
                console.error("Error during login:", err);
                alert("Something went wrong. Please try again.");
                submitBtn.textContent = "Log in to Marketplace 🔍";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
