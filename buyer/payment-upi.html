<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Payment | FarmConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/global.css">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="payment.css">
    <style>
        .upi-box {
            background: white; border-radius: 20px; padding: 40px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 500px; margin: 40px auto;
        }
        .qr-placeholder {
            width: 200px; height: 200px; background: #f8fafc; border: 2px dashed #e2e8f0;
            margin: 20px auto; display: flex; align-items: center; justify-content: center;
            border-radius: 12px; position: relative;
        }
        .vpa-input {
            width: 100%; border: 2px solid #e2e8f0; padding: 15px; border-radius: 12px;
            margin-top: 20px; font-size: 1rem; text-align: center; outline: none; transition: 0.3s;
        }
        .vpa-input:focus { border-color: var(--primary-blue); }
    </style>
</head>
<body style="background: #f8fafc;">

    <nav class="navbar">
        <a href="index.html" class="logo">
            <i class="fa-solid fa-seedling"></i>
            Farm<span>Connect</span>
        </a>
    </nav>

    <div class="payment-container" id="payment-view">
        <div class="upi-box">
            <h1 style="margin-bottom: 5px;">UPI Payment</h1>
            <p style="color: var(--text-light); font-size: 0.9rem;">Scan or use VPA to pay ₹904.25</p>

            <div class="qr-placeholder" id="qr-display">
                <i class="fa-solid fa-qrcode" style="font-size: 100px; color: #cbd5e1;"></i>
            </div>
            
            <p style="font-size: 0.8rem; color: var(--text-light); margin-top: 10px;">Scan using any UPI App (GPay, PhonePe, Bhim)</p>

            <div style="margin: 30px 0; display: flex; align-items: center;">
                <hr style="flex:1; border: 0; border-top: 1px solid #e2e8f0;">
                <span style="padding: 0 15px; font-size: 0.75rem; color: #94a3b8; font-weight: 700;">OR USE VPA</span>
                <hr style="flex:1; border: 0; border-top: 1px solid #e2e8f0;">
            </div>

            <input type="text" placeholder="yourname@upi" class="vpa-input" id="vpa-field">
            
            <button class="btn" onclick="startProcessing()" style="width: 100%; margin-top: 20px; background: var(--primary-color);">
                Verify & Pay
            </button>
            <a href="payment-details.html" style="display:block; margin-top: 20px; color: var(--text-light); font-size:0.85rem; text-decoration:none;">← Other Methods</a>
        </div>
    </div>

    <!-- Processing Overlay (Hidden by Default) -->
    <div id="processing-view" style="display:none; position:fixed; inset:0; background:rgba(255,255,255,0.95); z-index:1000; align-items:center; justify-content:center; text-align:center;">
        <div>
            <div id="spinner-icon">
                <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 3rem; color: var(--primary-color);"></i>
            </div>
            <div id="success-icon" style="display:none;">
                <i class="fa-solid fa-circle-check" style="font-size: 4rem; color: #22c55e;"></i>
            </div>
            <h2 id="status-text" style="margin-top: 20px;">Processing UPI Payment...</h2>
            <p id="status-subtext" style="color: var(--text-light);">Please do not refresh or close the window.</p>
        </div>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        window.startProcessing = async () => {
            const vpa = document.getElementById('vpa-field').value;
            if (!vpa && !vpa.includes('@')) {
                // Keep it simple for demo
            }

            document.getElementById('processing-view').style.display = 'flex';
            
            // Wait 2 seconds to simulate bank gateway
            setTimeout(async () => {
                document.getElementById('spinner-icon').style.display = 'none';
                document.getElementById('success-icon').style.display = 'block';
                document.getElementById('status-text').innerText = "Payment Successful!";
                document.getElementById('status-subtext').innerText = "Your order has been placed.";

                // Update Firestore
                const orderId = localStorage.getItem('lastOrderId');
                if (orderId) {
                    try {
                        await updateDoc(doc(db, "buyer_orders", orderId), {
                            status: "approved",
                            paymentMethod: "UPI",
                            paymentId: "UPI_" + Math.random().toString(36).substr(2, 9).toUpperCase(),
                            updatedAt: serverTimestamp()
                        });
                    } catch (e) {
                        console.error("Error updating order:", e);
                    }
                }

                setTimeout(() => {
                    window.location.href = "orders.html";
                }, 1500);
            }, 2500);
        };
    </script>

</body>
</html>
