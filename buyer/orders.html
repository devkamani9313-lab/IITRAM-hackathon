<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmConnect - My Orders</title>
    <!-- Premium Assets -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/global.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="orders.css">
</head>
<body class="dashboard-body">

    <!-- Premium Navbar -->
    <nav class="navbar">
        <div class="nav-container container">
            <a href="index.html" class="logo">
                🌾 <span>FarmConnect</span>
            </a>

            <div class="search-container animate-fade">
                <input type="text" id="product-search" placeholder="Search your order history...">
                <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>

            <div class="nav-actions">
                <div class="nav-links">
                    <a href="index.html">Marketplace</a>
                    <a href="orders.html" class="active">My Orders</a>
                </div>
                
                <div id="profile-area" class="profile-area">
                    <div class="cart-icon" onclick="window.location.href='checkout.html'">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <span class="cart-badge" id="cartBadgeCount">0</span>
                    </div>
                    <button class="nav-logout" id="logout-btn">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Orders Content -->
    <main class="orders-container">
        <header class="orders-header">
            <h1>Order History</h1>
            <p>Review and track your wholesale purchases.</p>
        </header>

        <!-- Order Summary Stats -->
        <section class="order-stats">
            <div class="stat-card">
                <p>Total Orders</p>
                <h2 id="stat-total">3</h2>
            </div>
            <div class="stat-card">
                <p>Delivered</p>
                <h2 id="stat-delivered">2</h2>
            </div>
            <div class="stat-card">
                <p>Pending</p>
                <h2 id="stat-pending">1</h2>
            </div>
        </section>

        <!-- Orders List (Dashboard Style) -->
        <section class="orders-list-wrapper">
            <header class="list-header">
                <div>Order ID</div>
                <div>Product Details</div>
                <div>Farmer</div>
                <div>Amount</div>
                <div>Status</div>
                <div>Date</div>
                <div>Action</div>
            </header>

            <div id="orders-list" class="orders-list">
                <!-- Dynamic Injection -->
                <div style="text-align: center; padding: 50px; color: var(--text-muted);">
                    <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
                    <p style="margin-top: 15px;">Synchronizing your order history...</p>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="auth.js"></script>
    <script type="module" src="orders.js"></script>
    <script>
        function viewOrder(id) {
            window.location.href = `order-details.html?id=${id}`;
        }
    </script>
</body>
</html>
