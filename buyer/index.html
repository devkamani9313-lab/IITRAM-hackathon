<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace | FarmConnect Buyer</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global Styles -->
    <link rel="stylesheet" href="../assets/global.css">
    <!-- Specific Buyer Styles -->
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="index.css">
</head>
<body class="dashboard-body">

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo">
                <i class="fa-solid fa-seedling"></i>
                Farm<span>Connect</span>
            </a>

            <div class="search-container">
                <input type="text" id="product-search" placeholder="Search for fresh crops, farmers, or locations...">
                <button class="search-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <select id="category-filter" class="nav-category-select">
                <option value="all">All Categories</option>
                <option value="vegetables">Vegetables</option>
                <option value="fruits">Fruits</option>
                <option value="grains">Grains</option>
            </select>

            <div class="nav-actions">
                <div class="nav-links">
                    <a href="index.html" class="active">Marketplace</a>
                    <a href="orders.html">My Orders</a>
                </div>

                <div class="cart-icon" onclick="window.location.href='checkout.html'">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="cart-badge">3</span>
                </div>
                
                <div id="auth-container" class="auth-section">
                    <!-- Login Button (Hidden if logged in) -->
                    <button id="login-nav-btn" class="btn" style="padding: 8px 20px; border-radius: 8px; font-weight: 600; background: var(--primary-color); color: white; border: none; cursor: pointer; display: none;" onclick="window.location.href='login.html'">
                        Login / Sign Up
                    </button>
                    
                    <!-- Profile Area (Hidden if logged out) -->
                    <div id="profile-area" class="profile-dropdown" style="display: none;">
                        <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&q=80&w=100" alt="Profile" class="profile-img">
                        <button id="logout-btn" class="nav-logout">Logout</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <!-- Main Content -->
        <main class="content" style="max-width: 1400px; margin: 0 auto; width: 100%;">
            <!-- Enhanced Hero Section -->
            <header class="marketplace-header" style="text-align: center; padding: 4rem 2rem; margin-bottom: 3rem; background: linear-gradient(135deg, #eafaf1 0%, #d1f2eb 100%); border-radius: 32px; box-shadow: inset 0 2px 10px rgba(255,255,255,0.5);">
                <div class="header-content" style="max-width: 700px; margin: 0 auto;">
                    <span style="display: block; font-size: 3rem; margin-bottom: 1rem;">🌾</span>
                    <h1 style="font-size: 3rem; font-weight: 900; color: #1a202c; letter-spacing: -1px; margin-bottom: 1rem;">
                        Fresh From The Farm
                    </h1>
                    <p style="color: #4a5568; font-size: 1.25rem; line-height: 1.6; font-weight: 500;">
                        Discover premium, hand-picked produce from verified local farmers. Direct wholesale sourcing tailored to fuel your business.
                    </p>
                </div>
            </header>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
                <h2 style="font-size: 1.5rem; font-weight: 700;">Available Produce</h2>
                <div id="results-count" style="font-size: 0.9rem; color: var(--text-light);">
                    Fetching live updates...
                </div>
            </div>

            <!-- This grid will be populated by app.js -->
            <div id="product-grid" class="products-grid">
                <!-- Loading State -->
                <div class="loading-spinner" style="grid-column: 1/-1; text-align: center; padding: 50px;">
                    <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--primary-color);"></i>
                    <p style="margin-top: 15px; color: var(--text-light);">Loading fresh products...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase & App Logic -->
    <script type="module" src="app.js"></script>
</body>
</html>
