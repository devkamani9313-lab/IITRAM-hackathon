<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmConnect - Welcome</title>
    <link rel="stylesheet" href="./assets/global.css">
    <style>
        body {
            /* Beautiful farm background with a softer glass overlay so the image pops */
            background: linear-gradient(rgba(240, 253, 244, 0.4), rgba(255, 255, 255, 0.6)),
                url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854?auto=format&fit=crop&q=80') no-repeat center center/cover;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .hero-container {
            text-align: center;
            max-width: 1000px;
            width: 90%;
            animation: fadeInUP 0.8s ease forwards;
        }

        @keyframes fadeInUP {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-title {
            font-size: 3.8rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            letter-spacing: -1.5px;
        }

        .hero-title span {
            background: linear-gradient(135deg, var(--primary-green), #10b981);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--text-light);
            margin-bottom: 4rem;
        }

        .cards-wrapper {
            display: flex;
            gap: 2rem;
            justify-content: center;
        }

        .role-card {
            flex: 1;
            background: var(--surface-color);
            padding: 3.5rem 2rem;
            border-radius: 24px;
            text-decoration: none;
            color: var(--text-dark);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.02);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .role-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--primary-green);
            transform: scaleX(0);
            transition: transform 0.4s ease;
            transform-origin: left;
        }

        /* Buyer gets a blue accent instead of green */
        .role-card.buyer::before {
            background: var(--primary-blue);
        }

        .role-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        }

        .role-card:hover::before {
            transform: scaleX(1);
        }

        .icon-wrapper {
            width: 90px;
            height: 90px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            background: var(--light-green);
            transition: transform 0.4s ease;
        }

        .role-card.buyer .icon-wrapper {
            background: #ebf8ff;
        }

        .role-card:hover .icon-wrapper {
            transform: scale(1.1) rotate(5deg);
        }

        .card-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
        }

        .card-desc {
            color: var(--text-light);
            font-size: 1.05rem;
            line-height: 1.5;
        }

        @media(max-width: 768px) {
            .cards-wrapper {
                flex-direction: column;
            }

            .hero-title {
                font-size: 2.5rem;
            }

            .role-card {
                padding: 2.5rem 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="hero-container">
        <h1 class="hero-title">Welcome to <span>FarmConnect</span></h1>
        <p class="hero-subtitle">The direct bridge between fresh harvest and wholesale buyers.</p>

        <div class="cards-wrapper">
            <!-- Farmer Routing Card -->
            <a href="./farmer/index.html" class="role-card">
                <div class="icon-wrapper">🧑‍🌾</div>
                <h2 class="card-title">I'm a Farmer</h2>
                <p class="card-desc">List your fresh produce, negotiate directly, and manage all your sales in one
                    place.</p>
            </a>

            <!-- Buyer Routing Card -->
            <a href="./buyer/login.html" class="role-card buyer">
                <div class="icon-wrapper">🏬</div>
                <h2 class="card-title">I'm a Buyer</h2>
                <p class="card-desc">Source high-quality, local produce directly from the farm for your restaurant or
                    store.</p>
            </a>
        </div>
    </div>

</body>

</html>
