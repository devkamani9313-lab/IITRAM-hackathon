<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Farmer Registration</title>
    <link rel="stylesheet" href="../assets/global.css">
    <link rel="stylesheet" href="farmer.css">
</head>
<body>
    <a href="index.html" style="position:absolute; top:20px; left:20px; text-decoration:none; color:var(--dark-green); font-weight:bold;">← Back to Login</a>
    
    <div class="auth-container">
        <div class="auth-card card-premium animate-fade">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🌾</div>
            <h1 style="margin-bottom: 0.5rem;">Join the Network</h1>
            <p style="color: var(--text-muted); margin-bottom: 2.5rem;">Create your farmer account and start selling your harvest directly to wholesale buyers.</p>
            
            <form id="farmer-register-form">
                <div class="form-group">
                    <label>Farm Name (or Your Name)</label>
                    <input type="text" id="reg-farmName" placeholder="e.g. Green Valley Farm" required>
                </div>
                
                <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div>
                        <label>Mobile Number</label>
                        <input type="tel" id="reg-mobile" placeholder="+91 98765..." required>
                    </div>
                    <div>
                        <label>City / Location</label>
                        <input type="text" id="reg-location" placeholder="e.g. Pune" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Create Secure Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register My Farm 🚀</button>

                <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-subtle);">
                    <p style="font-size: 0.95rem;">Already have an account? <a href="index.html" style="color: var(--primary); font-weight: 700; text-decoration: none;">Log in here</a></p>
                </div>
                <a href="../index.html" style="display: block; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); text-decoration: none; font-weight: 600;">← Back to Role Select</a>
            </form>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { db, collection, addDoc, query, where, getDocs } from "../assets/firebase-config.js";

        const regForm = document.querySelector('form');
        regForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const farmName = document.querySelectorAll('input')[0].value;
            const mobile = document.querySelectorAll('input')[1].value;
            const location = document.querySelectorAll('input')[2].value;
            const password = document.querySelectorAll('input')[3].value;
            const submitBtn = document.querySelector('button');

            submitBtn.textContent = "Creating Account...";
            submitBtn.disabled = true;

            try {
                // Check if mobile already exists
                const q = query(collection(db, "users"), where("mobile", "==", mobile));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    alert("This mobile number is already registered!");
                    submitBtn.textContent = "Create Account";
                    submitBtn.disabled = false;
                    return;
                }

                // Create new user document
                await addDoc(collection(db, "users"), {
                    farmName,
                    mobile,
                    location,
                    password,
                    role: 'farmer',
                    createdAt: new Date()
                });

                alert("Registration Successful! Please Log in.");
                window.location.href = "index.html";
            } catch (err) {
                console.error("Error creating account:", err);
                alert("Something went wrong. Please try again.");
                submitBtn.textContent = "Create Account";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
