<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Payment Method | FarmConnect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/global.css">
    <link rel="stylesheet" href="index.css"> <!-- Shared Nav/Vars -->
    <link rel="stylesheet" href="payment.css">
</head>
<body style="background: #f8fafc;">

    <nav class="navbar">
        <a href="index.html" class="logo">
            <i class="fa-solid fa-seedling"></i>
            Farm<span>Connect</span>
        </a>
        <div style="font-weight:700; color:var(--text-light); font-size: 0.9rem;">
            Secure Checkout
        </div>
        <div class="nav-actions">
            <div style="font-size: 0.8rem; color: var(--text-light); display: flex; align-items: center; gap: 8px;">
                <i class="fa-solid fa-shield-halved"></i> 256-bit Secure
            </div>
        </div>
    </nav>

    <div class="payment-container">
        <h1 class="payment-title">Choose Payment Method</h1>
        <div style="margin-bottom: 30px; padding: 15px; background: #f0f7ff; border-radius: 12px; font-weight: 700; color: var(--primary-color);">
            Total Payable: ₹904.25
        </div>

        <div class="payment-options-grid">
            <a href="payment-upi.html" class="method-card">
                <i class="fa-solid fa-mobile-screen-button"></i>
                <div class="method-info">
                    <h4>UPI Payment</h4>
                    <p>Pay using Google Pay, PhonePe, Paytm, etc.</p>
                </div>
                <i class="fa-solid fa-chevron-right" style="margin-left:auto; font-size: 1rem; color: #cbd5e1;"></i>
            </a>

            <a href="payment-netbanking.html" class="method-card">
                <i class="fa-solid fa-building-columns"></i>
                <div class="method-info">
                    <h4>Net Banking</h4>
                    <p>Select from all major Indian banks.</p>
                </div>
                <i class="fa-solid fa-chevron-right" style="margin-left:auto; font-size: 1rem; color: #cbd5e1;"></i>
            </a>

            <a href="payment-cod.html" class="method-card">
                <i class="fa-solid fa-truck-ramp-box"></i>
                <div class="method-info">
                    <h4>Cash on Delivery</h4>
                    <p>Pay when you receive your order at the farm/doorstep.</p>
                </div>
                <i class="fa-solid fa-chevron-right" style="margin-left:auto; font-size: 1rem; color: #cbd5e1;"></i>
            </a>
        </div>

        <div style="margin-top: 40px;">
            <a href="checkout.html" style="text-decoration:none; color: var(--text-light); font-weight: 600; font-size: 0.9rem;">
                ← Back to Order Summary
            </a>
        </div>
    </div>

</body>
</html>
