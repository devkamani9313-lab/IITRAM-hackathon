<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmConnect - Buyer Login</title>
    <link rel="stylesheet" href="../assets/global.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">

    <div class="login-container">
        <!-- Logo/Header Area -->
        <div class="login-header">
            <div class="login-logo">🏬</div>
            <h1>FarmConnect</h1>
            <p id="form-subtitle">Welcome back, wholesale partner.</p>
        </div>

        <!-- Form Area -->
        <div class="form-wrapper">
            <div class="tab-switcher">
                <button id="login-tab" class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button id="register-tab" class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <label for="login-mobile">Mobile Number</label>
                    <input type="tel" id="login-mobile" placeholder="+91 98765 43210" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary auth-btn">Login to Dashboard</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <div class="input-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" placeholder="ABC Wholesale" required>
                </div>
                <div class="input-group">
                    <label for="reg-mobile">Mobile Number</label>
                    <input type="tel" id="reg-mobile" placeholder="+91 98765 43210" required>
                </div>
                <div class="input-group">
                    <label for="reg-location">City / Location</label>
                    <input type="text" id="reg-location" placeholder="City Name" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">Create Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary auth-btn">Create Account</button>
            </form>
        </div>

        <div class="login-footer">
            <a href="../index.html">← Back to Home</a>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
    <script>
        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const loginTab = document.getElementById('login-tab');
            const registerTab = document.getElementById('register-tab');
            const subtitle = document.getElementById('form-subtitle');

            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                subtitle.innerText = "Welcome back, wholesale partner.";
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                loginTab.classList.remove('active');
                registerTab.classList.add('active');
                subtitle.innerText = "Join the wholesale network today.";
            }
        }
    </script>
</body>
</html>
